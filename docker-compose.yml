services:
  postgres:
    image: postgres:16-alpine
    container_name: totp-webapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: totp_webapp
    ports:
      - "5432:5432"
    volumes:
      - totp-webapp-postgres:/var/lib/postgresql/data

volumes:
  totp-webapp-postgres:
