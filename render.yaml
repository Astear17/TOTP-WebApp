services:
  - type: web
    name: totp-webapp-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: totp-webapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: totp-webapp-web
          property: host

  - type: web
    name: totp-webapp-web
    runtime: static
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: totp-webapp-api
          property: host

databases:
  - name: totp-webapp-db
    plan: free
