services:
  - type: web
    name: totp-webapp-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate -w apps/api && npm run prisma:migrate:deploy -w apps/api && npm run build -w packages/shared && npm run build -w packages/crypto && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: totp-webapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: totp-webapp-web
          property: host

  - type: web
    name: totp-webapp-web
    runtime: static
    buildCommand: npm install --include=dev && npm run build -w packages/shared && npm run build -w packages/crypto && npm run build -w apps/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: totp-webapp-api
          property: host

databases:
  - name: totp-webapp-db
    plan: free
